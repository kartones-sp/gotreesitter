name: ci

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./... -race -count=1

      - name: Run Parity Report (External Blob Mode)
        run: |
          GOTREESITTER_GRAMMAR_BLOB_DIR=grammars/grammar_blobs \
          go run -tags grammar_blobs_external ./cmd/parity_report > parity.log

      - name: Upload Parity Log
        uses: actions/upload-artifact@v4
        with:
          name: parity-log
          path: parity.log
